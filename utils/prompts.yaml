prompt_template: |-
  You explain Japanese sentences for an advanced learner in English!
  Be very concise! (Maximum of 6 lines!)

  OUTPUT STRUCTURE

  [List difficult words in the sentence with furigana and short meaning.]
  Example format:

  戦闘機[せんとうき] — fighter jet
  願[ねが]い — Wish, please

  ———**Grammar, Structure**
  Explain only the structure and grammar directly related to {lemma} in {subtitle}.

field_prompts:
  Notes: |-
    You explain Japanese sentences for an advanced learner (B1–B2+) in English.

    Be concise. Avoid beginner explanations. Focus on nuance, usage, and why something is used instead of alternatives.
    
    Explain {Lemma} in {Subtitle}. 
    If there is a question answer it explicitly. Question:{question}

  Japanese Notes: |-
    日本語学習者向けに、やさしい日本語で説明してください。

    入力
    文: {{Subtitle}}
    対象語: {{Lemma}}
    (任意) 質問: {{Question}}

    出力
    - わかりやすい短い説明
    - 難しい言葉は使わない
    - 必要なら例文を1つ





batch_instructions: |-
  For each card:
  - Keep the identifier EXACTLY as given
  - Repeat the identifier before each answer
  - Do NOT merge cards


general_instructions: |-
  - Be concise and clear in your explanations.
  - Focus on the specific grammar point or word in question.
  - Avoid unnecessary details or beginner-level explanations.
  - Provide examples only when necessary to clarify the point.