prompt_template: |-
  Gib mir eine Liste der schwierigen Wörter in diesem Satz: "{Subtitle}".

  戦闘機[せんとうき] — fighter jet
  願[ねが]い — Wish, please

  Erkläre die Grammatik in dem Satz: "{Subtitle}" auf deutsch.
  Gib 4 weitere Beispiele, wenn nötig. Vermeide unnötige Details oder Erklärungen auf Anfängerniveau.

field_prompts:
  Notes: |-
    Erkläre den Satz: "{Subtitle}" auf deutsch.
    Gib 4 weitere Beispiele, wenn nötig. Vermeide unnötige Details oder Erklärungen auf Anfängerniveau.

  Japanese Notes: |-
    「文「{Subtitle}」を説明してください。特に{Lemma}に注目してください。日本語で答えて下さい。
    必要であれば、追加の例も示してください。初心者向けの余計な説明は避けてください。」
    
    出力
    - わかりやすい短い説明
    - 難しい言葉は使わない
    - 必要なら例文を4つ



batch_instructions: |-
  For each card:
  - Keep the identifier EXACTLY as given
  - Repeat the identifier before each answer
  - Do NOT merge cards


general_instructions: |-
  - Be concise and clear in your explanations.
  - Focus on the specific grammar point or word in question.
  - Avoid unnecessary details or beginner-level explanations.
  - Provide examples only when necessary to clarify the point.